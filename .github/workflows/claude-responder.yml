name: 'Claude Responder'

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  respond:
    if: >-
      (github.event.sender.type != 'Bot'
        || github.event.sender.login == 'claude-workflows-integration-test[bot]')
      && contains(github.event.comment.body, '@claude')
    runs-on: diranged-claude-tests
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: diranged/claude-code-agentic-workflows/claude-respond@integ-testing
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          compose_prompt: 'true'
          agent_name: 'auto'
          allowed_bots: 'claude[bot],claude-workflows-integration-test[bot]'
          allowed_tools: 'Bash(*),Read,Glob,Grep,Edit,Write,WebFetch,WebSearch'
