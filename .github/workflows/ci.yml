name: 'CI'

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npm run format:check

      - name: Basic validation
        run: |
          echo "CI check passed"
          # Minimal CI for integration testing of CI retry flow
          if [ -f "FAIL_CI" ]; then
            echo "FAIL_CI marker found, failing intentionally"
            exit 1
          fi
