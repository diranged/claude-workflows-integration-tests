name: 'Claude Engineer Managers'

on:
  workflow_dispatch:
    inputs:
      engineer:
        description: 'Engineer to run'
        type: choice
        required: true
        options:
          - docs-engineer
          - code-janitor
          - security-engineer
      force_rotation:
        description: 'Force dashboard rotation'
        type: boolean
        default: false

jobs:
  engineer:
    runs-on: diranged-claude-tests
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    timeout-minutes: 30
    steps:
      - uses: diranged/claude-code-agentic-workflows/claude-engineer@integ-testing
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          agent_name: ${{ inputs.engineer }}
          dashboard_label: 'integration-test:${{ inputs.engineer }}'
          task_label: 'integration-test:${{ inputs.engineer }}-task'
          delegation_label: 'claude:design'
          max_implementations: '0'
          timeout_minutes: '30'
          force_rotation: ${{ inputs.force_rotation && 'true' || 'false' }}
          allowed_bots: 'claude[bot],claude-workflows-integration-test[bot]'
